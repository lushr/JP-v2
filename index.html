<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8c8dc">
  <title>Japanese Sentence Drill</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="top-card">
      <div class="app-title-row">
        <div>
          <p class="eyebrow">Japanese sentence drill</p>
          <h1 id="levelTitle">Choose a set</h1>
        </div>
        <button id="resetButton" class="icon-button" type="button" aria-label="Shuffle deck">
          <i class="bi bi-shuffle"></i>
        </button>
      </div>

      <div class="level-picker" id="levelPicker" aria-label="Choose a practice set">
        <button class="level-button" type="button" data-level-index="0">1–10</button>
        <button class="level-button" type="button" data-level-index="1">11–20</button>
        <button class="level-button" type="button" data-level-index="2">21–30</button>
        <button class="level-button" type="button" data-level-index="3">31–40</button>
        <button class="level-button" type="button" data-level-index="4">41–52</button>
      </div>

      <div class="progress-wrap" aria-label="Progress">
        <div class="progress-label">
          <span><i class="bi bi-bar-chart-line"></i> Progress</span>
          <span id="progressText">0 / 0</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>
    </section>

    <section class="prompt-card" aria-live="polite">
      <div class="chip-row" id="chipRow"></div>
      <p class="prompt-label"><i class="bi bi-translate"></i> English prompt</p>
      <h2 id="englishPrompt">Loading...</h2>
    </section>

    <section id="answerCard" class="answer-card hidden" aria-live="polite">
      <p class="answer-label"><i class="bi bi-eye"></i> Japanese answer</p>
      <p id="japaneseAnswer" class="japanese-text"></p>
      <p id="noteText" class="note-text"></p>
      <button id="nextButton" class="primary-button yellow" type="button">
        <i class="bi bi-arrow-right-circle"></i> Next sentence
      </button>
    </section>

    <button id="revealButton" class="primary-button pink" type="button">
      <i class="bi bi-eye"></i> Reveal answer
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
